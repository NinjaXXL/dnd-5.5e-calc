<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>5e Damage Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Damage Calculator</h1>
  </header>

  <main>

    <!-- Global Settings -->
    <section id="global-settings">
      <h2>Global Settings</h2>
      <div id="globalSettingsContainer"></div>
    </section>

    <!-- Action Builder -->
    <section id="actions">
      <h2>Actions</h2>

      <div id="actionBuilderContainer"></div>

      <button id="addActionBtn">+ Add Action</button>
    </section>

    <!-- Results -->
    <section id="results">
      <h2>Results</h2>
      <div id="resultsContainer"></div>
    </section>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
